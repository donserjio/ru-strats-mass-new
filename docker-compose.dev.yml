services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: iq-fund-dev
    ports:
      - "5005:5000"
    environment:
      NODE_ENV: development
      PORT: 5000
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    volumes:
      - .:/app
      - /app/node_modules
    stdin_open: true
    tty: true
