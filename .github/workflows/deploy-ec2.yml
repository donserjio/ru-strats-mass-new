name: Deploy (prod)

on:
  push:
    branches: ["main"]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      app_image: ${{ steps.meta.outputs.app_image }}
      app_image_latest: ${{ steps.meta.outputs.app_image_latest }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        run: |
          set -euo pipefail
          REPO_LOWER="${GITHUB_REPOSITORY,,}"
          APP_IMAGE="${{ env.REGISTRY }}/${REPO_LOWER}:${{ github.sha }}"
          APP_IMAGE_LATEST="${{ env.REGISTRY }}/${REPO_LOWER}:latest"
          echo "app_image=$APP_IMAGE" >> "$GITHUB_OUTPUT"
          echo "app_image_latest=$APP_IMAGE_LATEST" >> "$GITHUB_OUTPUT"

      - name: Build & push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.app_image }}
            ${{ steps.meta.outputs.app_image_latest }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy on EC2 over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || 22 }}
          script: |
            set -euo pipefail

            DEPLOY_PATH="${{ secrets.EC2_DEPLOY_PATH }}"
            REPO_SSH_URL="${{ secrets.EC2_REPO_SSH_URL }}"
            BRANCH="${{ secrets.EC2_DEPLOY_BRANCH || 'main' }}"

            if [ -z "$DEPLOY_PATH" ]; then
              echo "EC2_DEPLOY_PATH is not set"
              exit 1
            fi

            if [ ! -d "$DEPLOY_PATH/.git" ]; then
              if [ -z "$REPO_SSH_URL" ]; then
                echo "EC2_REPO_SSH_URL is required for first deploy"
                exit 1
              fi
              mkdir -p "$DEPLOY_PATH"
              git clone "$REPO_SSH_URL" "$DEPLOY_PATH"
            fi

            cd "$DEPLOY_PATH"
            git fetch --all --prune
            git checkout "$BRANCH"
            git reset --hard "origin/$BRANCH"

            echo "${{ secrets.GHCR_READ_TOKEN }}" | sudo docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin

            APP_IMAGE='${{ needs.build-and-push.outputs.app_image_latest }}'

            sudo env APP_IMAGE="$APP_IMAGE" docker compose -f docker-compose.prod.yml pull
            sudo env APP_IMAGE="$APP_IMAGE" docker compose -f docker-compose.prod.yml up -d --remove-orphans
            sudo docker image prune -f
