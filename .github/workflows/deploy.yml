name: Deploy to Vercel
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: team_i0zWlSOEf9LL1E4s8lgzUT7k
      VERCEL_PROJECT_ID: prj_KkIfVa8fiDys7PkpEDAGw5Us8jrl
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '20'
      - run: npm install -g vercel
      - name: Link project (non-interactive)
        run: |
          mkdir -p .vercel
          cat > .vercel/project.json <<JSON
          {"orgId":"$VERCEL_ORG_ID","projectId":"$VERCEL_PROJECT_ID"}
          JSON
      - name: Pull settings/env
        run: vercel pull --yes --token=$VERCEL_TOKEN
      - run: npm ci
      - run: vercel build --prod --token=$VERCEL_TOKEN
      - run: vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
